name: Daily Box Office Pipeline

on:
  schedule:
    - cron: "0 23 * * *"  # ogni giorno alle 23:00 UTC = mezzanotte ora italiana
  workflow_dispatch:        # trigger manuale per backfill o test

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      TMDB_API_KEY:       ${{ secrets.TMDB_API_KEY }}
      BOXOFFICE_DB_URL:   ${{ secrets.BOXOFFICE_DB_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (with warehouse extras)
        run: pip install -e ".[dev,warehouse]"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run tests
        run: pytest tests/ -v

      - name: Compute date
        id: date
        run: |
          YESTERDAY=$(date -u -d 'yesterday' '+%Y-%m-%d')
          echo "yesterday=$YESTERDAY" >> $GITHUB_OUTPUT
          echo "raw_path=data/raw/box_office_raw/cineguru_${YESTERDAY}_${YESTERDAY}.csv" >> $GITHUB_OUTPUT

      - name: Ingest - Cineguru
        run: boxoffice-int ingest --yesterday

      - name: Load to Neon
        run: boxoffice-int load --input "${{ steps.date.outputs.raw_path }}"

      - name: Enrich DB - TMDB metadata
        run: boxoffice-int enrich-db --delay 1.0

      - name: Enrich CSV - TMDB metadata
        run: boxoffice-int enrich --input "${{ steps.date.outputs.raw_path }}"

      - name: Build - market analytics
        run: |
          boxoffice-int build \
            --input "${{ steps.date.outputs.raw_path }}" \
            --metadata data/curated/film_metadata/film_metadata.csv

      - name: Upload raw data
        uses: actions/upload-artifact@v4
        with:
          name: box-office-raw-${{ steps.date.outputs.yesterday }}
          path: data/raw/box_office_raw/
          retention-days: 90

      - name: Upload curated metadata
        uses: actions/upload-artifact@v4
        with:
          name: film-metadata-${{ steps.date.outputs.yesterday }}
          path: data/curated/film_metadata/
          retention-days: 90

      - name: Upload market analytics products
        uses: actions/upload-artifact@v4
        with:
          name: market-analytics-${{ steps.date.outputs.yesterday }}
          path: data/products/market_analytics/
          retention-days: 90
